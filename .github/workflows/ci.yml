name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check coverage threshold (80%)
        run: |
          TOTAL=$(grep -c "^DA:" coverage/lcov.info || echo 0)
          HIT=$(grep "^DA:" coverage/lcov.info | grep -cv ",0$" || echo 0)
          if [ "$TOTAL" -gt 0 ]; then
            PCT=$((HIT * 100 / TOTAL))
            echo "Coverage: $PCT% ($HIT/$TOTAL lines)"
            if [ "$PCT" -lt 80 ]; then
              echo "::error::Coverage $PCT% is below 80% threshold"
              exit 1
            fi
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info

  pana:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Install pana
        run: dart pub global activate pana

      - name: Run pana analysis
        run: |
          RESULT=$(dart pub global run pana --no-warning . 2>&1)
          echo "$RESULT"
          # Extract the score line (e.g., "Points: 130/160.")
          SCORE_LINE=$(echo "$RESULT" | grep -oP 'Points: \K\d+(?=/)')
          TOTAL_LINE=$(echo "$RESULT" | grep -oP 'Points: \d+/\K\d+')
          if [ -n "$SCORE_LINE" ] && [ -n "$TOTAL_LINE" ]; then
            echo "Pana score: $SCORE_LINE/$TOTAL_LINE"
            if [ "$SCORE_LINE" -lt 120 ]; then
              echo "::error::Pana score $SCORE_LINE/$TOTAL_LINE is below 120 threshold"
              exit 1
            fi
          else
            echo "::warning::Could not parse pana score"
          fi
